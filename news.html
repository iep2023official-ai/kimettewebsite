 <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>

</head>
<body>

  <!-- ===== NAV ===== -->
  <nav id="nav">
    <div class="container nav-inner">
      <a href="index.html" class="logo">Kimette</a>
      <div class="nav-links">
        <a href="process.html">원료 공정</a>
        <a href="technology.html">기술 원료</a>
        <a href="applications.html">적용 제형</a>
        <a href="news.html" class="nav-active">최신 소식</a>
        <a href="contact.html" class="nav-cta">문의하기</a>
      </div>
      <button class="hamburger" id="hamburger" aria-label="메뉴" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-menu" id="mobile-menu">
      <a href="process.html" class="mobile-link">원료 공정</a>
      <a href="technology.html" class="mobile-link">기술 원료</a>
      <a href="applications.html" class="mobile-link">적용 사례</a>
      <a href="news.html" class="mobile-link">최신 소식</a>
      <a href="contact.html" class="mobile-link mobile-link-cta">문의하기</a>
    </div>
  </nav>

  <!-- ===== PAGE HERO ===== -->
  <section class="page-hero" style="background: var(--dark); padding: 80px 0 60px; position: relative; overflow: hidden;">
    <div class="container">
      <div class="page-hero-content fade-in" style="opacity: 1;">
        <div style="font-size: clamp(0.875rem, 2vw, 1.2rem); letter-spacing: 0.05em; text-transform: uppercase; color: var(--magenta-bright); margin-bottom: 20px; font-weight: 500;">News</div>
        <h1 style="font-size: clamp(1.8rem, 3.4vw, 3.2rem); font-weight: 800; margin: 0; line-height: 1.2;">Kimette의 최신 뉴스</h1>
      </div>
    </div>
  </section>

  <!-- ===== NEWS ===== -->
  <section id="news" style="padding: 120px 0; background: var(--dark);">
    <div class="container">
      <!-- News Items -->
      <div id="news-grid" class="news-grid" style="display: grid; gap: 40px; margin-top: 40px;">
        <div class="news-item fade-in" style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); transition: all 0.22s ease;">
          <div style="color: var(--text-muted-dk); font-size: 0.9rem; margin-bottom: 12px;">로딩 중...</div>
          <h3 style="font-size: 1.4rem; margin: 0 0 16px; color: var(--text-dk);">게시물을 불러오는 중입니다</h3>
          <p style="color: var(--text-muted-dk); line-height: 1.7;">잠시만 기다려주세요.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ===== CTA SECTION ===== -->
  <section style="padding: 80px 0; background: var(--dark);">
    <div class="container">
      <div class="app-cta fade-in" style="margin-top: 0;">
        <div>
          <p class="app-cta-title">문의 사항이 있으신가요?</p>
          <p>Kimette에 대해 더 알아보고 싶으시거나, 협력 제안이 있으시면 언제든지 문의해주세요.</p>
        </div>
        <a href="contact.html" class="btn btn-primary">문의하기 →</a>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <div class="container footer-inner">
      <span class="footer-logo">Kimette</span>
      <span class="footer-copy">© 2025 Kimette. All rights reserved.</span>
      <a href="mailto:iep2023official@gmail.com" class="footer-email">iep2023official@gmail.com</a>
    </div>
  </footer>

  <script>
  // CMS 게시물 로드
  async function loadNews() {
    const newsGrid = document.getElementById('news-grid');

    try {
      // GitHub에서 _news 폴더의 파일 목록 가져오기
      const response = await fetch('https://api.github.com/repos/iep2023official-ai/kimettesite/contents/_news');
      const files = await response.json();

      if (!Array.isArray(files) || files.length === 0) {
        newsGrid.innerHTML = `
          <div class="news-item fade-in" style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); transition: all 0.22s ease;">
            <div style="color: var(--text-muted-dk); font-size: 0.9rem; margin-bottom: 12px;">곧 업데이트될 예정입니다</div>
            <h3 style="font-size: 1.4rem; margin: 0 0 16px; color: var(--text-dk);">최신 소식 준비 중</h3>
            <p style="color: var(--text-muted-dk); line-height: 1.7;">Kimette의 흥미로운 뉴스와 언론 보도를 곧 공개할 예정입니다.</p>
          </div>
        `;
        return;
      }

      let newsHTML = '';

      // 최신 글 순서로 정렬
      const sortedFiles = files.sort((a, b) => new Date(b.name) - new Date(a.name));

      for (const file of sortedFiles) {
        if (!file.name.endsWith('.md')) continue;

        // 마크다운 파일 내용 가져오기
        const fileContent = await fetch(file.download_url);
        const markdown = await fileContent.text();

        // 프론트매터 파싱 (YAML)
        const lines = markdown.split('\n');
        let frontmatter = {};
        let content = '';
        let inFrontmatter = false;
        let frontmatterEnd = 0;

        for (let i = 0; i < lines.length; i++) {
          if (lines[i].trim() === '---') {
            if (!inFrontmatter) {
              inFrontmatter = true;
            } else {
              frontmatterEnd = i + 1;
              break;
            }
          } else if (inFrontmatter && lines[i].includes(':')) {
            const [key, value] = lines[i].split(':').map(s => s.trim());
            frontmatter[key] = value;
          }
        }

        content = lines.slice(frontmatterEnd).join('\n');

        // HTML 생성
        const htmlContent = marked.parse(content);
        const date = new Date(frontmatter.date || file.name).toLocaleDateString('ko-KR');

        newsHTML += `
          <div class="news-item fade-in" style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); transition: all 0.22s ease;">
            <div style="color: var(--text-muted-dk); font-size: 0.9rem; margin-bottom: 12px;">
              ${date} · ${frontmatter.category || '소식'}
            </div>
            <h3 style="font-size: 1.4rem; margin: 0 0 16px; color: var(--text-dk);">${frontmatter.title || '제목 없음'}</h3>
            <div style="color: var(--text-muted-dk); line-height: 1.7; margin-bottom: 16px;">
              ${htmlContent}
            </div>
            ${frontmatter.link ? `<a href="${frontmatter.link}" target="_blank" style="color: var(--magenta-bright); text-decoration: none;">자세히 보기 →</a>` : ''}
          </div>
        `;
      }

      newsGrid.innerHTML = newsHTML;

    } catch (error) {
      console.error('뉴스 로드 실패:', error);
      newsGrid.innerHTML = `
        <div class="news-item fade-in" style="padding: 40px; background: var(--dark-3); border: 1px solid var(--border-dk); border-radius: var(--r-lg); transition: all 0.22s ease;">
          <div style="color: var(--text-muted-dk); font-size: 0.9rem; margin-bottom: 12px;">오류 발생</div>
          <h3 style="font-size: 1.4rem; margin: 0 0 16px; color: var(--text-dk);">게시물을 불러올 수 없습니다</h3>
          <p style="color: var(--text-muted-dk); line-height: 1.7;">잠시 후 다시 시도해주세요.</p>
        </div>
      `;
    }
  }

  // 페이지 로드 시 게시물 불러오기
  document.addEventListener('DOMContentLoaded', loadNews);
  </script>

  <script src="script.js"></script>
</body>
